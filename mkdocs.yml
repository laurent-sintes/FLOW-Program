  - Insights:
      - Repères: insights/index.md
      - Histoire de FLOW: insights/histoire-de-flow.md
      - Journal des insights: insights/journal-des-insights.md
      - Positionnement de FLOW:
          - De l’OMS au Demand Management: insights/oms-vers-demand-management.md
          - FLOW n’est pas une plateforme d’engagement: insights/flow-n-est-pas-une-plateforme-d-engagement.md
          - "ERP + OMS : séparation utile ou dette architecturale ?": insights/erp-oms-separation-ou-plateforme-integree.md
