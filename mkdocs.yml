site_name: Programme FLOW
site_description: Référentiel documentaire du programme FLOW
repo_name: Programme FLOW
repo_url: https://github.com/laurent-sintes/FLOW-Program

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search

extra_css:
  - stylesheets/flow.css

