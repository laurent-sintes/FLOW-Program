<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img"><defs><style>.bg{fill:#f8fbfa}.box{fill:#fff;stroke:#c7e4de;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.h{font:700 24px Aptos,Calibri,sans-serif;fill:#236159}.hw{font:700 24px Aptos,Calibri,sans-serif;fill:#fff}.t{font:500 16px Aptos,Calibri,sans-serif;fill:#1e293b}.tw{font:500 16px Aptos,Calibri,sans-serif;fill:#eaf4f2}.s{font:600 14px Aptos,Calibri,sans-serif;fill:#5b6b78}.a{stroke:#236159;stroke-width:3;fill:none;marker-end:url(#m)}.aa{stroke:#e09238;stroke-width:3;fill:none;marker-end:url(#ma)}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#236159"/></marker><marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#e09238"/></marker></defs><rect class="bg" width="1280" height="620" rx="24"/><text class="h" x="54" y="58">Plateforme ouverte et gouvernée</text><text class="s" x="54" y="84">Centraliser le commun, ouvrir des capacités contrôlées aux domaines, éviter le monolithe comme le foisonnement.</text><rect class="core" x="390" y="145" width="500" height="330" rx="30"/><text class="hw" x="520" y="190">Plateforme FLOW</text><text class="tw" x="492" y="230">ressources communes gouvernées</text><text class="tw" x="492" y="260">contrats API / événements</text><text class="tw" x="492" y="290">standards d'extension</text><text class="tw" x="492" y="320">observabilité / sécurité</text><text class="tw" x="492" y="350">catalogue de capacités</text><rect class="box" x="70" y="135" width="230" height="100" rx="18"/><text class="h" x="116" y="176">B2C</text><text class="t" x="105" y="205">expérience / apps</text><rect class="box" x="70" y="260" width="230" height="100" rx="18"/><text class="h" x="116" y="301">B2B</text><text class="t"