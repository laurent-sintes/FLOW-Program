<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">FLOW dans l'écosystème BRD</title>
  <desc id="desc">Schéma de positionnement cible de FLOW dans l'écosystème applicatif BRD.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920" rx="24"/>
  <text class="title" x="750" y="70" text-anchor="middle">FLOW dans l'écosystème BRD</text>
  <text class="subtitle" x="750" y="100" text-anchor="middle">FLOW porte Demand et Fulfillment ; les domaines spécialisés restent autour, raccordés par contrats.</text>
  <rect class="panel" x="42" y="132" width="1416" height="730" rx="24"/>

  <rect class="core" x="500" y="238" width="500" height="342" rx="30"/>
  <text class="hWhite" x="750" y="292" text-anchor="middle">Plateforme FLOW</text>
  <text class="smallWhite" x="750" y="322" text-anchor="middle">Demand · Case Management · cohérence transverse</text>
  <rect class="pill" x="555" y="365" width="175" height="30" rx="15"/>
  <text class="pillText" x="591" y="385">Case Management</text>
  <rect class="pill" x="765" y="365" width="175" height="30" rx="15"/>
  <text class="pillText" x="819" y="385">Stock unifié</text>
  <rect class="pill" x="555" y="420" width="175" height="30" rx="15"/>
  <text class="pillText" x="587" y="440">Réseau d'exécution</text>
  <rect class="pill" x="765" y="420" width="175" height="30" rx="15"/>
  <text class="pillText" x="806" y="440">Supply Services</text>
  <rect class="pill" x="555" y="475" width="175" height="30" rx="15"/>
  <text class="pillText" x="590" y="495">Product Agreement</text>
  <rect class="pill" x="765" y="475" width="175" height="30" rx="15"/>
  <text class="pillText" x="825" y="495">Vues 360</text>
  <text class="smallWhite" x="750" y="545" text-anchor="middle">Instruction, promesse, allocation, orchestration et événements.</text>
  <rect class="blue" x="78" y="165" width="270" height="222" rx="18"/>
  <text class="h" x="102" y="205">Engagement / canaux</text>
  <text class="small" x="102" y="237">Intention, commerce, retail et</text>
  <text class="small" x="102" y="257">publication.</text>
  <text class="small" x="102" y="277">Canaux digitaux : Salesforce</text>
  <text class="small" x="102" y="297">Commerce Cloud, Elastic, CMS / Web</text>
  <text class="small" x="102" y="317">Platform.</text>
  <text class="small" x="102" y="337">Retail : Cegid Y2, back-office store,</text>
  <text class="small" x="102" y="357">stock magasin.</text>

  <rect class="purple" x="78" y="405" width="270" height="210" rx="18"/>
  <text class="h" x="102" y="445">Produit / offre / planning</text>
  <text class="small" x="102" y="477">PLM Centric, PIM, DAM.</text>
  <text class="small" x="102" y="497">Assortiments, contenus, prix.</text>
  <text class="small" x="102" y="517">Planning : BPC / EPM, Optimate /</text>
  <text class="small" x="102" y="537">APS.</text>

  <rect class="green" x="1152" y="170" width="270" height="220" rx="18"/>
  <text class="h" x="1176" y="210">Supply</text>
  <text class="small" x="1176" y="242">Logistique et entrepôts : Maersk 4PL,</text>
  <text class="small" x="1176" y="262">C-Logistics, Bleckmann UK, WMS.</text>
  <text class="small" x="1176" y="282">Transport / douanes : TMS Connex,</text>
  <text class="small" x="1176" y="302">statuts et événements.</text>

  <rect class="red" x="1152" y="442" width="270" height="170" rx="18"/>
  <text class="h" x="1176" y="482">Finance</text>
  <text class="small" x="1176" y="514">SAP FI/CO, comptabilité, contrôle,</text>
  <text class="small" x="1176" y="534">fiscalité et écritures financières.</text>
  <text class="small" x="1176" y="554">Domaine séparé de Demand,</text>
  <text class="small" x="1176" y="574">Fulfillment et Supply.</text>

  <rect class="grey" x="500" y="655" width="500" height="145" rx="18"/>
  <text class="h" x="524" y="695">Sourcing / fournisseurs</text>
  <text class="small" x="524" y="727">SNC, Fast, Vendor, Purchase Request, Planned Request.</text>
  <text class="small" x="524" y="747">Contributeurs du contexte amont, sans être nécessairement absorbés par</text>
  <text class="small" x="524" y="767">FLOW.</text>

  <path class="arrowSoft" d="M348 260 C410 260 432 308 500 336"/>
  <path class="arrowSoft" d="M348 500 C420 486 438 454 500 432"/>
  <path class="arrow" d="M1000 350 C1060 312 1095 274 1152 260"/>
  <path class="arrow" d="M1000 458 C1068 490 1095 520 1152 535"/>
  <path class="arrowAccent" d="M750 580 L750 655"/>
  <rect class="panelSoft" x="142" y="828" width="1216" height="58" rx="16"/>
  <text class="small" x="750" y="858" text-anchor="middle">SAP et NewStore ne sont pas représentés comme satellites : ils sont dans la trajectoire de retrait / remplacement, avec découpage par responsabilité.</text>
</svg>
