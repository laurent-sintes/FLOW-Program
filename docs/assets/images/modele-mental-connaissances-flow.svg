<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Modèle mental des connaissances FLOW</title>
  <desc id="desc">Graphe montrant comment les réunions, faits, insights, vision, principes, domaines, capacités, produits, architecture, hotspots et contrôles s'articulent dans le référentiel FLOW.</desc>
  <defs>
    <style>
      .bg{fill:#f7fbfa}
      .panel{fill:#ffffff;stroke:#d7e5e2;stroke-width:2}
      .hub{fill:#21695f;stroke:#123f3a;stroke-width:2}
      .vision{fill:#eaf5f3;stroke:#21695f;stroke-width:2}
      .rule{fill:#fff6e8;stroke:#d98b28;stroke-width:2}
      .target{fill:#eef4ff;stroke:#4d6fae;stroke-width:2}
      .risk{fill:#fff0f1;stroke:#c65362;stroke-width:2}
      .admin{fill:#f2f0fb;stroke:#6d5ea8;stroke-width:2}
      .source{fill:#eef8ee;stroke:#5b9962;stroke-width:2}
      .title{font:700 34px Aptos,Calibri,sans-serif;fill:#123f3a}
      .subtitle{font:600 17px Aptos,Calibri,sans-serif;fill:#58706b}
      .h{font:700 21px Aptos,Calibri,sans-serif;fill:#173f3a}
      .hw{font:700 23px Aptos,Calibri,sans-serif;fill:#ffffff}
      .t{font:500 15px Aptos,Calibri,sans-serif;fill:#24333f}
      .tw{font:500 15px Aptos,Calibri,sans-serif;fill:#eaf5f3}
      .s{font:600 13px Aptos,Calibri,sans-serif;fill:#62756f}
      .band{font:700 14px Aptos,Calibri,sans-serif;fill:#21695f;letter-spacing:.5px}
      .arrow{stroke:#21695f;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrow2{stroke:#d98b28;stroke-width:3;fill:none;marker-end:url(#arrow2)}
      .arrow3{stroke:#4d6fae;stroke-width:3;fill:none;marker-end:url(#arrow3)}
      .dash{stroke:#6d5ea8;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow4)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#21695f"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#d98b28"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#4d6fae"/>
    </marker>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#6d5ea8"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="980" rx="30"/>
  <text class="title" x="70" y="72">Modèle mental des connaissances FLOW</text>
  <text class="subtitle" x="70" y="103">Reconnaître une information, la ranger au bon endroit, puis mesurer ses impacts dans le référentiel.</text>

  <rect class="panel" x="55" y="135" width="405" height="705" rx="24"/>
  <text class="band" x="85" y="172">1. MATIÈRE ENTRANTE</text>

  <rect class="source" x="95" y="210" width="325" height="118" rx="18"/>
  <text class="h" x="125" y="248">Réunion datée</text>
  <text class="t" x="125" y="278">atelier, transcript, notes</text>
  <text class="t" x="125" y="302">contexte et périmètre</text>

  <rect class="source" x="95" y="365" width="325" height="118" rx="18"/>
  <text class="h" x="125" y="403">Faits observés</text>
  <text class="t" x="125" y="433">ce qui est dit ou confirmé</text>
  <text class="t" x="125" y="457">sans sur-interprétation</text>

  <rect class="rule" x="95" y="520" width="325" height="118" rx="18"/>
  <text class="h" x="125" y="558">Insights</text>
  <text class="t" x="125" y="588">ce que cela change</text>
  <text class="t" x="125" y="612">dans la compréhension FLOW</text>

  <rect class="risk" x="95" y="675" width="325" height="118" rx="18"/>
  <text class="h" x="125" y="713">Questions ouvertes</text>
  <text class="t" x="125" y="743">hypothèses, risques</text>
  <text class="t" x="125" y="767">arbitrages à instruire</text>

  <rect class="panel" x="515" y="135" width="575" height="705" rx="24"/>
  <text class="band" x="545" y="172">2. STRUCTURE DE CONNAISSANCE</text>

  <rect class="hub" x="675" y="210" width="255" height="110" rx="24"/>
  <text class="hw" x="742" y="253">Vision</text>
  <text class="tw" x="715" y="282">pourquoi, ambition</text>
  <text class="tw" x="716" y="306">positionnement cible</text>

  <rect class="rule" x="560" y="370" width="230" height="115" rx="18"/>
  <text class="h" x="592" y="408">Principes</text>
  <text class="t" x="592" y="438">règles durables</text>
  <text class="t" x="592" y="462">de conception</text>

  <rect class="vision" x="825" y="370" width="230" height="115" rx="18"/>
  <text class="h" x="857" y="408">Concepts</text>
  <text class="t" x="857" y="438">vocabulaire</text>
  <text class="t" x="857" y="462">et glossaire</text>

  <rect class="target" x="560" y="545" width="230" height="115" rx="18"/>
  <text class="h" x="592" y="583">Domaines</text>
  <text class="t" x="592" y="613">responsabilités</text>
  <text class="t" x="592" y="637">frontières stables</text>

  <rect class="target" x="825" y="545" width="230" height="115" rx="18"/>
  <text class="h" x="857" y="583">Capacités</text>
  <text class="t" x="857" y="613">ce qu'un domaine</text>
  <text class="t" x="857" y="637">doit savoir faire</text>

  <rect class="target" x="560" y="705" width="230" height="115" rx="18"/>
  <text class="h" x="592" y="743">Produits FLOW</text>
  <text class="t" x="592" y="773">socles, services</text>
  <text class="t" x="592" y="797">et responsabilités</text>

  <rect class="vision" x="825" y="705" width="230" height="115" rx="18"/>
  <text class="h" x="857" y="743">Patterns</text>
  <text class="t" x="857" y="773">formes réutilisables</text>
  <text class="t" x="857" y="797">de solution</text>

  <rect class="panel" x="1145" y="135" width="400" height="705" rx="24"/>
  <text class="band" x="1175" y="172">3. IMPACTS ET GOUVERNANCE</text>

  <rect class="risk" x="1190" y="225" width="310" height="116" rx="18"/>
  <text class="h" x="1220" y="263">Hotspots</text>
  <text class="t" x="1220" y="293">points sensibles</text>
  <text class="t" x="1220" y="317">à arbitrer</text>

  <rect class="target" x="1190" y="390" width="310" height="116" rx="18"/>
  <text class="h" x="1220" y="428">Architecture cible</text>
  <text class="t" x="1220" y="458">produits, flux</text>
  <text class="t" x="1220" y="482">responsabilités</text>

  <rect class="source" x="1190" y="555" width="310" height="116" rx="18"/>
  <text class="h" x="1220" y="593">Transformation</text>
  <text class="t" x="1220" y="623">changements</text>
  <text class="t" x="1220" y="647">d'usage et posture</text>

  <rect class="admin" x="1190" y="720" width="310" height="116" rx="18"/>
  <text class="h" x="1220" y="758">Contrôles</text>
  <text class="t" x="1220" y="788">cartouches, métriques</text>
  <text class="t" x="1220" y="812">liens, rôles, build</text>

  <path class="arrow" d="M258 328 L258 365"/>
  <path class="arrow2" d="M258 483 L258 520"/>
  <path class="arrow2" d="M420 579 C500 570 560 515 625 485"/>
  <path class="arrow" d="M420 424 C535 380 610 310 675 275"/>
  <path class="arrow2" d="M420 734 C540 716 1110 300 1190 283"/>

  <path class="arrow2" d="M802 320 L675 370"/>
  <path class="arrow" d="M805 320 L940 370"/>
  <path class="arrow3" d="M675 485 L675 545"/>
  <path class="arrow3" d="M790 603 L825 603"/>
  <path class="arrow3" d="M675 660 L675 705"/>
  <path class="arrow" d="M790 763 L825 763"/>

  <path class="arrow3" d="M1055 603 C1115 585 1140 460 1190 448"/>
  <path class="arrow" d="M1055 763 C1120 742 1150 505 1190 473"/>
  <path class="arrow2" d="M930 265 C1050 245 1110 255 1190 283"/>
  <path class="arrow3" d="M1345 506 L1345 555"/>
  <path class="dash" d="M1345 671 L1345 720"/>
  <path class="dash" d="M1190 780 C1125 900 660 895 255 805"/>

  <text class="s" x="475" y="384">alimente</text>
  <text class="s" x="1008" y="246">révèle</text>
  <text class="s" x="1072" y="573">structure</text>
  <text class="s" x="1106" y="840">vérifie et maintient</text>
</svg>
