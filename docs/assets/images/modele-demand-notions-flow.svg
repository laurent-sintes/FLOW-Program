<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Modèle mental des notions FLOW</title>
  <desc id="desc">Schéma des notions Demand, fait, événement, décision, règle, promesse, Case et plan d'exécution.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980" rx="24"/>
  <text class="title" x="800" y="70" text-anchor="middle">Modèle mental des notions FLOW</text>
  <text class="subtitle" x="800" y="100" text-anchor="middle">Comprendre qui fait quoi dans le traitement d'une demande.</text>
  <rect class="blue" x="70" y="170" width="290" height="170" rx="18"/>
  <text class="h" x="94" y="210">ENGAGEMENT</text>
  <text class="small" x="94" y="242">Intention</text>
  <text class="small" x="94" y="262">parcours, canal</text>
  <text class="small" x="94" y="282">contexte relationnel</text>

  <rect class="panelSoft" x="430" y="160" width="300" height="250" rx="18"/>
  <text class="h" x="454" y="200">DEMAND</text>
  <text class="small" x="454" y="232">Case</text>
  <text class="small" x="454" y="252">demande qualifiée</text>
  <text class="small" x="454" y="272">contexte et statut</text>
  <text class="small" x="454" y="292">promesse attendue</text>
  <text class="small" x="454" y="312">l'objet qui reste lisible</text>

  <rect class="accent" x="790" y="150" width="330" height="255" rx="18"/>
  <text class="h" x="814" y="190">FULFILLMENT</text>
  <text class="small" x="814" y="222">Décision</text>
  <text class="small" x="814" y="242">applique les règles</text>
  <text class="small" x="814" y="262">compare les contraintes</text>
  <text class="small" x="814" y="282">arbitre la promesse</text>
  <text class="small" x="814" y="302">explicable et traçable</text>

  <rect class="green" x="1230" y="170" width="300" height="265" rx="18"/>
  <text class="h" x="1254" y="210">SUPPLY</text>
  <text class="small" x="1254" y="242">Ressource</text>
  <text class="small" x="1254" y="262">stock, capacité</text>
  <text class="small" x="1254" y="282">SLA, contrainte</text>
  <text class="small" x="1254" y="302">Fait / event</text>
  <text class="small" x="1254" y="322">disponibilité, confirmation, exception</text>
  <text class="small" x="1254" y="342">terrain</text>

  <rect class="panel" x="430" y="510" width="300" height="155" rx="18"/>
  <text class="h" x="454" y="550">Contexte</text>
  <text class="small" x="454" y="582">Agreement, priorité</text>
  <text class="small" x="454" y="602">client, canal, pays</text>
  <text class="small" x="454" y="622">contraintes métier</text>

  <rect class="amber" x="790" y="510" width="330" height="155" rx="18"/>
  <text class="h" x="814" y="550">Règle / policy</text>
  <text class="small" x="814" y="582">priorisation</text>
  <text class="small" x="814" y="602">éligibilité</text>
  <text class="small" x="814" y="622">fallback ou exception</text>

  <rect class="grey" x="455" y="760" width="300" height="102" rx="18"/>
  <text class="h" x="479" y="800">Journal du Case</text>
  <text class="small" x="479" y="832">faits, événements, décisions, statuts</text>

  <rect class="grey" x="845" y="760" width="300" height="102" rx="18"/>
  <text class="h" x="869" y="800">Projection consommable</text>
  <text class="small" x="869" y="832">vue statut, promesse, disponibilité</text>

  <rect class="core" x="620" y="690" width="360" height="70" rx="18"/>
  <text class="hWhite" x="800" y="730" text-anchor="middle">Promesse + plan</text>
  <text class="smallWhite" x="800" y="752" text-anchor="middle">ce qui est décidé, expliqué et suivi</text>
  <path class="arrow" d="M360 255 L430 255"/>
  <path class="arrowAccent" d="M730 270 L790 270"/>
  <path class="arrow" d="M1120 275 L1230 275"/>
  <path class="arrowSoft" d="M1380 435 C1380 620 1000 660 980 690"/>
  <path class="arrowAccent" d="M945 405 L945 510"/>
  <path class="arrowSoft" d="M580 410 L580 510"/>
  <path class="arrowAccent" d="M800 760 L800 690"/>
  <path class="arrow" d="M620 725 C555 725 560 760 605 760"/>
  <path class="arrow" d="M980 725 C1050 725 1045 760 995 760"/>
</svg>
