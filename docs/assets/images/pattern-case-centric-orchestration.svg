<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
<title id="title">Pattern Case-centric orchestration</title><desc id="desc">La demande au centre, alimentée par événements, faits, policies et systèmes d'exécution.</desc>
<defs><style>.bg{fill:#f8fbfa}.box{fill:#fff;stroke:#c7e4de;stroke-width:2}.core{fill:#236159}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.h{font:700 24px Aptos,Calibri,sans-serif;fill:#236159}.hw{font:700 24px Aptos,Calibri,sans-serif;fill:#fff}.t{font:500 17px Aptos,Calibri,sans-serif;fill:#1e293b}.tw{font:500 16px Aptos,Calibri,sans-serif;fill:#eaf4f2}.s{font:600 14px Aptos,Calibri,sans-serif;fill:#5b6b78}.a{stroke:#236159;stroke-width:3;fill:none;marker-end:url(#m)}.aa{stroke:#e09238;stroke-width:3;fill:none;marker-end:url(#ma)}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#236159"/></marker><marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#e09238"/></marker></defs>
<rect class="bg" width="1280" height="620" rx="24"/><text class="h" x="54" y="58">Case-centric orchestration</text><text class="s" x="54" y="84">Le Case porte la demande, le contexte, les décisions et l'histoire ; le plan s'adapte aux faits observés.</text>
<rect class="box" x="70" y="160" width="240" height="120" rx="18"/><text class="h" x="110" y="205">Demande</text><text class="t" x="110" y="235">Request · Goal · Intent</text>
<rect class="box" x="70" y="365" width="240" height="120" rx="18"/><text class="h" x="108" y="410">Événements</text><text class="t" x="108" y="440">Ce qui s'est passé</text>
<circle class="core" cx="640" cy="305" r="128"/><text class="hw" x="580" y="292">CASE</text><text class="tw" x="538" y="324">unité autonome de décision</text><text class="tw" x="570" y="350">et d'orchestration</text>
<rect class="accent" x="490" y="78" width="300" height="88" rx="18"/><text class="h" x="548" y="113">Policies / règles</text><text class="t" x="532" y="142">guident la décision</text>
<rect class="box" x="930" y="160" width="270" height="120" rx="18"/><text class="h" x="982" y="205">Plan adaptable</text><text class="t" x="976" y="235">tâches · attentes · exceptions</text>
<rect class="box" x="930" y="365" width="270" height="120" rx="18"/><text class="h" x="982" y="410">Exécution</text><text class="t" x="975" y="440">API · Supply · finance · partenaires</text>
<path class="a" d="M310 220 C390 220 445 250 515 278"/><path class="a" d="M310 425 C390 425 440 372 515 334"/><path class="aa" d="M640 166 L640 180"/><path class="a" d="M765 280 C830 248 870 222 930 220"/><path class="a" d="M930 425 C850 425 795 375 745 340"/><path class="aa" d="M640 433 C640 490 430 520 230 485"/>
<text class="s" x="455" y="250">contexte</text><text class="s" x="812" y="250">décision</text><text class="s" x="790" y="405">retours d'exécution</text><text class="s" x="425" y="520">apprentissage / adaptation</text>
</svg>