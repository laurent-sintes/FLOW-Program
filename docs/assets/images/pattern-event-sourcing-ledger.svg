<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" preserveAspectRatio="xMidYMid meet" role="img"><defs><style>.bg{fill:#f8fbfa}.box{fill:#fff;stroke:#c7e4de;stroke-width:2}.event{fill:#fff8f0;stroke:#e09238;stroke-width:2}.read{fill:#eaf4f2;stroke:#236159;stroke-width:2}.h{font:700 24px Aptos,Calibri,sans-serif;fill:#236159}.t{font:500 16px Aptos,Calibri,sans-serif;fill:#1e293b}.s{font:600 14px Aptos,Calibri,sans-serif;fill:#5b6b78}.a{stroke:#236159;stroke-width:3;fill:none;marker-end:url(#m)}.aa{stroke:#e09238;stroke-width:3;fill:none;marker-end:url(#ma)}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#236159"/></marker><marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#e09238"/></marker></defs><rect class="bg" width="1280" height="620" rx="24"/><text class="h" x="54" y="58">Event Sourcing / Ledger</text><text class="s" x="54" y="84">Conserver l'histoire des événements pour reconstruire, auditer et expliquer l'état courant.</text><rect class="box" x="70" y="230" width="190" height="100" rx="16"/><text class="h" x="118" y="272">Action</text><text class="t" x="108" y="300">ReserveStock</text><path class="aa" d="M260 280 L360 280"/><rect class="event" x="360" y="130" width="520" height="300" rx="22"/><text class="h" x="560" y="170">Ledger immuable</text><rect class="box" x="405" y="215" width="95" height="60" rx="12"/><text class="s" x="424" y="242">+10</text><text class="s" x="415" y="262">Received</text><rect class="box" x="520" y="215" width="95" height="60" rx="12"/><text class="s" x="545" y="242">-1</text><text class="s" x="540" y="262">Sold</text><rect class="box" x="635" y="215" width="95" height="60" rx="12"/><text class="s" x="660" y="242">-1</text><text class="s" x="642" y="262">Reserved</text><rect class="box" x="750" y="215" width="95" height="60" rx="12"/><text class="s" x="775" y="242">+1</text><text class="s" x="765" y="262">Returned</text><path class="a" d="M500 245 L520 245"/><path class="a" d="M615 245 L635 245"/><path class="a" d="M730 245 L750 245"/><text class="t" x="475" y="342">La vérité courante est reconstruite depuis l'historique.</text><path class="a" d="M880 280 L980 220"/><path class="a" d="M880 300 L980 360"/><rect class="read" x="980" y="170" width="220" height="95" rx="16"/><text class="h" x="1030" y="210">Projection</text><text class="t" x="1020" y="238">stock disponible</text><rect class="read" x="980" y="325" width="220" height="95" rx="16"/><text class="h" x="1038" y="365">Audit</text><text class="t" x="1020" y="393">preuve / explication</text></svg>