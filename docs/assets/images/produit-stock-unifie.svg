<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Stock Unifié</title>
  <desc id="desc">Un Operational DataHub qui transforme des mouvements distribués en disponibilité gouvernée et explicable.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" rx="24"/>
  <text class="title" x="640" y="58" text-anchor="middle">Stock Unifié</text>
  <text class="subtitle" x="640" y="86" text-anchor="middle">Un Operational DataHub qui transforme des mouvements distribués en disponibilité gouvernée et explicable.</text>
  <rect class="blue" x="60" y="145" width="260" height="330" rx="18"/>
  <text class="h" x="84" y="185">Sources opérationnelles</text>
  <text class="small" x="84" y="217">POS / magasins</text>
  <text class="small" x="84" y="237">WMS / entrepôts</text>
  <text class="small" x="84" y="257">C-LOG / partenaires</text>
  <text class="small" x="84" y="277">SAP / NewStore</text>
  <text class="small" x="84" y="297">Retours / inventaires</text>
  <rect class="core" x="405" y="145" width="470" height="160" rx="18"/>
  <text class="hWhite" x="429" y="185">Operational DataHub Stock</text>
  <text class="smallWhite" x="429" y="217">ledger, projections, fraîcheur, confiance, réconciliation</text>
  <rect class="green" x="960" y="145" width="260" height="330" rx="18"/>
  <text class="h" x="984" y="185">Consommateurs</text>
  <text class="small" x="984" y="217">Cases FLOW</text>
  <text class="small" x="984" y="237">Engagement / canaux</text>
  <text class="small" x="984" y="257">Supply / exécution</text>
  <text class="small" x="984" y="277">Vues 360</text>
  <text class="small" x="984" y="297">Finance / contrôle</text>
  <rect class="panel" x="430" y="340" width="175" height="122" rx="18"/>
  <text class="h" x="454" y="380">Ledger</text>
  <text class="small" x="454" y="412">mouvements</text>
  <text class="small" x="454" y="432">auditables</text>
  <rect class="panel" x="625" y="340" width="175" height="122" rx="18"/>
  <text class="h" x="649" y="380">Projections</text>
  <text class="small" x="649" y="412">disponible</text>
  <text class="small" x="649" y="432">promettable</text>
  <rect class="accent" x="430" y="480" width="175" height="122" rx="18"/>
  <text class="h" x="454" y="520">Décision</text>
  <text class="small" x="454" y="552">réserver</text>
  <text class="small" x="454" y="572">allouer</text>
  <rect class="panel" x="625" y="480" width="175" height="142" rx="18"/>
  <text class="h" x="649" y="520">Explain</text>
  <text class="small" x="649" y="552">source</text>
  <text class="small" x="649" y="572">fraîcheur</text>
  <text class="small" x="649" y="592">confiance</text>
  <path class="arrow" d="M320 300 L405 300"/>
  <path class="arrow" d="M875 300 L960 300"/>
  <path class="arrowAccent" d="M640 305 L640 340"/>
  <rect class="panelSoft" x="140" y="645" width="1000" height="62" rx="18"/>
  <text class="h" x="640" y="672" text-anchor="middle">Capacités exposées : Availability · Reserve · Allocate · Release · Explain · Reconcile</text>
  <text class="small" x="640" y="696" text-anchor="middle">Le Stock Unifié qualifie ce que l'entreprise peut promettre, à qui, pourquoi et avec quel niveau de confiance.</text>
</svg>
