<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Processus de cadrage FLOW</title>
  <desc id="desc">Vue d'ensemble des étapes du cadrage FLOW, de l'existant à l'arbitrage Build / Buy.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="900" rx="24"/>
  <text class="title" x="750" y="70" text-anchor="middle">Processus de cadrage FLOW</text>
  <text class="subtitle" x="750" y="100" text-anchor="middle">Transformer les observations terrain en architecture cible, produits, solutions et trajectoire avant delivery.</text>
  <rect class="panel" x="42" y="128" width="1416" height="730" rx="24"/>
  <rect class="panelSoft" x="92" y="160" width="1316" height="78" rx="18"/>
  <text class="h" x="750" y="192" text-anchor="middle">Chaque étape produit un livrable qui devient l'entrée de l'étape suivante</text>
  <text class="small" x="750" y="218" text-anchor="middle">Existant → Vision → Principes → Urbanisme → Capacités → Produits → Options de solution → Build / Buy</text>
  <rect class="blue" x="68" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="92" y="322">0</text>
  <text class="h" x="92" y="354">Comprendre</text>
  <text class="small" x="92" y="390">Panorama</text>
  <text class="small" x="92" y="410">irritants</text>
  <text class="small" x="92" y="430">tensions</text>
  <path class="arrowAccent" d="M249 374 L258 374"/>
  <rect class="purple" x="266" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="290" y="322">1</text>
  <text class="h" x="290" y="354">Vision</text>
  <text class="small" x="290" y="390">Ambition</text>
  <text class="small" x="290" y="410">problème</text>
  <text class="small" x="290" y="430">cible narrative</text>
  <path class="arrowAccent" d="M447 374 L456 374"/>
  <rect class="purple" x="464" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="488" y="322">2</text>
  <text class="h" x="488" y="354">Principes</text>
  <text class="small" x="488" y="390">Règles</text>
  <text class="small" x="488" y="410">arbitrages</text>
  <text class="small" x="488" y="430">garde-fous</text>
  <path class="arrowAccent" d="M645 374 L654 374"/>
  <rect class="green" x="662" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="686" y="322">3</text>
  <text class="h" x="686" y="354">Urbaniser</text>
  <text class="small" x="686" y="390">Domaines</text>
  <text class="small" x="686" y="410">responsabilités</text>
  <text class="small" x="686" y="430">frontières</text>
  <path class="arrowAccent" d="M843 374 L852 374"/>
  <rect class="green" x="860" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="884" y="322">4</text>
  <text class="h" x="884" y="354">Capacités</text>
  <text class="small" x="884" y="390">Savoir-faire</text>
  <text class="small" x="884" y="410">durables</text>
  <text class="small" x="884" y="430">consommateurs</text>
  <path class="arrowAccent" d="M1041 374 L1050 374"/>
  <rect class="green" x="1058" y="286" width="176" height="168" rx="18"/>
  <text class="num" x="1082" y="322">5</text>
  <text class="h" x="1082" y="354">Produits</text>
  <text class="small" x="1082" y="390">Gouvernance</text>
  <text class="small" x="1082" y="410">owners</text>
  <text class="small" x="1082" y="430">backlog</text>
  <path class="arrowAccent" d="M1239 374 L1248 374"/>
  <rect class="dark" x="1256" y="286" width="176" height="168" rx="18"/>
  <text class="hWhite" x="1280" y="322">6</text>
  <text class="hWhite" x="1280" y="354">Solutions</text>
  <text class="smallWhite" x="1280" y="390">Fonctionnalités</text>
  <text class="smallWhite" x="1280" y="410">interfaces</text>
  <text class="smallWhite" x="1280" y="430">exigences</text>
  <path class="arrowAccent" d="M1344 462 C1344 510 750 500 750 530"/>
  <rect class="dark" x="570" y="540" width="360" height="120" rx="18"/>
  <text class="hWhite" x="594" y="574">7  Arbitrer Build / Buy</text>
  <text class="smallWhite" x="594" y="606">Acheter, construire ou hybrider selon la couverture,</text>
  <text class="smallWhite" x="594" y="624">les risques, les coûts complets et la gouvernance</text>
  <text class="smallWhite" x="594" y="642">attendue.</text>
  <path class="arrowAccent" d="M680 668 C600 690 430 694 415 716"/>
  <path class="arrow" d="M820 668 C900 690 1060 694 1085 716"/>
  <rect class="accent" x="130" y="724" width="570" height="98" rx="18"/>
  <text class="h" x="154" y="757">Trajectoire Buy</text>
  <text class="small" x="154" y="786">RFI pour explorer le marché → RFP pour comparer les réponses → RFQ pour chiffrer et</text>
  <text class="small" x="154" y="804">contractualiser.</text>
  <rect class="green" x="800" y="724" width="570" height="98" rx="18"/>
  <text class="h" x="824" y="757">Trajectoire Build</text>
  <text class="small" x="824" y="786">Préparer la plateforme de développement : environnements, CI/CD, standards, données</text>
  <text class="small" x="824" y="804">de test et backlog.</text>
</svg>
