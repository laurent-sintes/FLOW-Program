<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
<title id="title">Pattern API conversationnelle</title><desc id="desc">Une API conversationnelle maintient un dialogue corrélé entre un consommateur, un Case et des systèmes contributeurs.</desc>
<defs><style>.bg{fill:#f8fbfa}.box{fill:#fff;stroke:#c7e4de;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.h{font:700 24px Aptos,Calibri,sans-serif;fill:#236159}.hw{font:700 24px Aptos,Calibri,sans-serif;fill:#fff}.t{font:500 16px Aptos,Calibri,sans-serif;fill:#1e293b}.tw{font:500 16px Aptos,Calibri,sans-serif;fill:#eaf4f2}.s{font:600 14px Aptos,Calibri,sans-serif;fill:#5b6b78}.a{stroke:#236159;stroke-width:3;fill:none;marker-end:url(#m)}.aa{stroke:#e09238;stroke-width:3;fill:none;marker-end:url(#ma)}.dash{stroke-dasharray:7 7}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#236159"/></marker><marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#e09238"/></marker></defs>
<rect class="bg" width="1280" height="620" rx="24"/><text class="h" x="54" y="58">API conversationnelle</text><text class="s" x="54" y="84">Une interaction longue n'est pas un appel unique : c'est un dialogue corrélé, observable et pilotable.</text>
<rect class="box" x="70" y="210" width="250" height="150" rx="20"/><text class="h" x="116" y="255">Consommateur</text><text class="t" x="108" y="288">canal · domaine · partenaire</text><text class="s" x="108" y="322">initie, suit, complète</text>
<rect class="core" x="500" y="180" width="280" height="210" rx="28"/><text class="hw" x="565" y="235">Conversation</text><text class="tw" x="555" y="268">correlation id</text><text class="tw" x="555" y="296">état du dialogue</text><text class="tw" x="555" y="324">messages / événements</text><text class="tw" x="555" y="352">timeouts / relances</text>
<rect class="box" x="955" y="120" width="250" height="112" rx="18"/><text class="h" x="1015" y="162">Case FLOW</text><text class="t" x="995" y="192">porte la demande</text>
<rect class="box" x="955" y="285" width="250" height="112" rx="18"/><text class="h" x="1004" y="327">Services FLOW</text><text class="t" x="995" y="357">stock · rules · network</text>
<rect class="box" x="955" y="450" width="250" height="112" rx="18"/><text class="h" x="1010" y="492">Systèmes tiers</text><text class="t" x="995" y="522">WMS · POS · paiement</text>
<path class="a" d="M320 255 C390 235 430 235 500 250"/><text class="s" x="352" y="228">request / command</text>
<path class="aa dash" d="M500 318 C430 356 392 360 320 330"/><text class="s" x="350" y="386">status / callback</text>
<path class="a" d="M780 235 C850 205 890 176 955 176"/><text class="s" x="820" y="190">pilote</text>
<path class="a" d="M780 300 C850 320 890 340 955 340"/><text class="s" x="820" y="330">interroge / réserve</text>
<path class="aa dash" d="M955 506 C860 520 805 438 740 390"/><text class="s" x="780" y="520">événements retour</text>
<rect class="accent" x="430" y="470" width="420" height="70" rx="18"/><text class="h" x="486" y="502">Contrat conversationnel</text><text class="t" x="475" y="528">états · messages · SLA · erreurs · reprise · audit</text>
<path class="aa" d="M640 390 L640 470"/>
</svg>