  <text class="h" x="94" y="190">Sources</text>
  <text class="small" x="94" y="222">POS</text>
  <text class="small" x="94" y="242">WMS</text>
  <text class="small" x="94" y="262">C-LOG</text>
  <text class="small" x="94" y="282">SAP / NewStore</text>
  <text class="small" x="94" y="302">Partenaires</text>
  <rect class="panel" x="975" y="150" width="235" height="310" rx="18"/>
  <text class="h" x="999" y="190">Usages</text>
  <text class="small" x="999" y="222">API métier</text>
  <text class="small" x="999" y="242">Décisions</text>
  <text class="small" x="999" y="262">Vues 360</text>
  <text class="small" x="999" y="282">Audit</text>
  <text class="small" x="999" y="302">Monitoring</text>
  <rect class="core" x="430" y="132" width="420" height="350" rx="28"/>
  <text class="hWhite" x="640" y="178" text-anchor="middle">Operational DataHub</text>
  <rect class="accent" x="480" y="220" width="145" height="102" rx="18"/>
  <text class="h" x="504" y="260">Ledger</text>
  <text class="small" x="504" y="292">historique</text>
