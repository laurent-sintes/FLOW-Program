  <rect class="accent" x="480" y="335" width="145" height="102" rx="18"/>
  <text class="h" x="504" y="375">Projection</text>
  <text class="small" x="504" y="407">lecture</text>
  <rect class="accent" x="655" y="335" width="145" height="102" rx="18"/>
  <text class="h" x="679" y="375">Confiance</text>
  <text class="small" x="679" y="407">source</text>
  <path class="arrow" d="M305 305 L430 305"/>
  <text class="small" x="328" y="287">événements / faits</text>
  <path class="arrowAccent" d="M850 305 L975 305"/>
