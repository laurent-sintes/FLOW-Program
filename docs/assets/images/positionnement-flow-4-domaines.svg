<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Positionnement de FLOW</title>
  <desc id="desc">FLOW porte le coeur Demand + Fulfillment ; Engagement et Supply sont adhérents et raccordés contractuellement.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="920" rx="24"/>
  <text class="title" x="800" y="68" text-anchor="middle">Positionnement de FLOW</text>
  <text class="subtitle" x="800" y="98" text-anchor="middle">Engagement capte l'intention ; FLOW gouverne Demand + Fulfillment ; Supply exécute et remonte les faits.</text>
  <rect class="panel" x="58" y="150" width="330" height="500" rx="24"/>
  <rect class="core" x="430" y="130" width="740" height="540" rx="30"/>
  <rect class="panel" x="1212" y="150" width="330" height="500" rx="24"/>
  <text class="labelAccent" x="223" y="190" text-anchor="middle">DOMAINE ADHÉRENT</text>
  <text class="h" x="223" y="236" text-anchor="middle">Engagement</text>
  <text class="hWhite" x="800" y="178" text-anchor="middle">COEUR FLOW</text>
  <text class="labelAccent" x="1377" y="190" text-anchor="middle">DOMAINE ADHÉRENT</text>
  <text class="h" x="1377" y="236" text-anchor="middle">Supply</text>
  <text class="txt" x="115" y="300">Capte l'intention</text>
  <text class="txt" x="115" y="334">Porte les parcours</text>
  <text class="txt" x="115" y="368">Négocie le contexte</text>
  <text class="txt" x="115" y="402">Pilote l'expérience</text>
  <text class="small" x="115" y="478">CRM · portails · marketplace</text>
  <text class="small" x="115" y="504">B2B · B2C · SAV · négoce</text>
  <text class="txt" x="1268" y="300">Expose les ressources</text>
  <text class="txt" x="1268" y="334">Publie les contraintes</text>
  <text class="txt" x="1268" y="368">Exécute physiquement</text>
  <text class="txt" x="1268" y="402">Retourne les événements</text>
  <text class="small" x="1268" y="478">stock · entrepôts · magasins</text>
  <text class="small" x="1268" y="504">transport · usines · fournisseurs</text>
  <rect class="panelSoft" x="500" y="250" width="275" height="295" rx="18"/>
  <text class="h" x="524" y="290">Demand</text>
  <text class="small" x="524" y="322">Qualifie la demande.</text>
  <text class="small" x="524" y="342">Porte le Case.</text>
  <text class="small" x="524" y="362">Suit les statuts.</text>
  <text class="small" x="524" y="382">Porte la promesse attendue.</text>
  <text class="small" x="524" y="402">intention qualifiée · priorité · contexte</text>
  <rect class="accent" x="825" y="250" width="275" height="295" rx="18"/>
  <text class="h" x="849" y="290">Fulfillment</text>
  <text class="small" x="849" y="322">Arbitre la promesse.</text>
  <text class="small" x="849" y="342">Choisit la trajectoire.</text>
  <text class="small" x="849" y="362">Alloue et réserve.</text>
  <text class="small" x="849" y="382">Ouvre les exceptions.</text>
  <text class="small" x="849" y="402">sourcing · split · priorisation</text>
  <rect class="blue" x="150" y="725" width="390" height="122" rx="18"/>
  <text class="h" x="174" y="765">Contrats d'entrée</text>
  <text class="small" x="174" y="797">APIs, événements, demandes, contexte et engagements</text>
  <text class="small" x="174" y="817">utiles à la décision.</text>
  <rect class="grey" x="605" y="725" width="390" height="122" rx="18"/>
  <text class="h" x="629" y="765">Règle de périmètre</text>
  <text class="small" x="629" y="797">FLOW ne remplace pas Engagement ni Supply ; il</text>
  <text class="small" x="629" y="817">gouverne la cohérence Demand + Fulfillment qui les relie.</text>
  <rect class="green" x="1060" y="725" width="390" height="122" rx="18"/>
  <text class="h" x="1084" y="765">Contrats Supply</text>
  <text class="small" x="1084" y="797">Disponibilités, SLA, statuts, contraintes, confirmations et</text>
  <text class="small" x="1084" y="817">exceptions terrain.</text>
  <path class="arrow" d="M388 400 C420 400 450 397 500 397"/>
  <path class="arrowAccent" d="M775 397 L825 397"/>
  <path class="arrow" d="M1100 397 C1145 397 1175 400 1212 400"/>
  <path class="arrowAccent" d="M800 545 L800 725"/>
</svg>
