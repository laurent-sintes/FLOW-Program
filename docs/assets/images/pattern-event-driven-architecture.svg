<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img"><defs><style>.bg{fill:#f8fbfa}.box{fill:#fff;stroke:#c7e4de;stroke-width:2}.hub{fill:#236159}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.h{font:700 24px Aptos,Calibri,sans-serif;fill:#236159}.hw{font:700 22px Aptos,Calibri,sans-serif;fill:#fff}.t{font:500 16px Aptos,Calibri,sans-serif;fill:#1e293b}.tw{font:500 15px Aptos,Calibri,sans-serif;fill:#eaf4f2}.s{font:600 14px Aptos,Calibri,sans-serif;fill:#5b6b78}.a{stroke:#236159;stroke-width:3;fill:none;marker-end:url(#m)}.aa{stroke:#e09238;stroke-width:3;fill:none;marker-end:url(#ma)}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#236159"/></marker><marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#e09238"/></marker></defs><rect class="bg" width="1280" height="620" rx="24"/><text class="h" x="54" y="58">Event-Driven Architecture</text><text class="s" x="54" y="84">Les systèmes publient des faits métier ; les consommateurs réagissent sans dépendre de flux point à point.</text><rect class="box" x="70" y="150" width="230" height="95" rx="16"/><text class="h" x="118" y="190">POS</text><text class="t" x="108" y="218">StockSold</text><rect class="box" x="70" y="285" width="230" height="95" rx="16"/><text class="h" x="116" y="325">WMS</text><text class="t" x="105" y="353">StockReceived</text><rect class="box" x="70" y="420" width="230" height="95" rx="16"/><text class="h" x="112" y="460">Case</text><text class="t" x="102" y="488">CaseUpdated</text><rect class="hub" x="465" y="215" width="350" height="170" rx="24"/><text class="hw" x="548" y="270">Event Backbone</text><text class="tw" x="535" y="302">topics · contrats · rejeu</text><text class="tw" x="535" y="330">observabilité · gouvernance</text><rect class="accent" x="970" y="125" width="240" height="85" rx="16"/><text class="h" x="1018" y="160">Stock Unifié</text><text class="t" x="1012" y="188">projette la disponibilité</text><rect class="accent" x="970" y="268" width="240" height="85" rx="16"/><text class="h" x="1026" y="303">Vues 360</text><text class="t" x="1012" y="331">agrège la situation</text><rect class="accent" x="970" y="411" width="240" height="85" rx="16"/><text class="h" x="1028" y="446">Décision</text><text class="t" x="1007" y="474">déclenche règles / actions</text><path class="a" d="M300 198 C365 198 400 250 465 268"/><path class="a" d="M300 333 C365 333 400 315 465 310"/><path class="a" d="M300 468 C365 468 400 365 465 340"/><path class="aa" d="M815 270 C880 240 905 168 970 168"/><path class="aa" d="M815 305 C880 305 905 310 970 310"/><path class="aa" d="M815 340 C880 370 905 454 970 454"/></svg>