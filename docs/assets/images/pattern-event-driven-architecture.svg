<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Event-Driven Architecture</title>
  <desc id="desc">Les systèmes publient des faits métier ; les consommateurs réagissent sans dépendre de flux point à point.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="620" rx="24"/>
  <text class="title" x="60" y="58">Event-Driven Architecture</text>
  <text class="subtitle" x="60" y="86">Les systèmes publient des faits métier ; les consommateurs réagissent sans dépendre de flux point à point.</text>
  <rect class="core" x="465" y="215" width="350" height="170" rx="24"/>
  <text class="hWhite" x="640" y="270" text-anchor="middle">Event Backbone</text>
  <text class="smallWhite" x="640" y="302" text-anchor="middle">topics · contrats · rejeu</text>
  <text class="smallWhite" x="640" y="330" text-anchor="middle">observabilité · gouvernance</text>
  <rect class="panel" x="70" y="150" width="230" height="102" rx="18"/>
  <text class="h" x="94" y="190">POS</text>
  <text class="small" x="94" y="222">StockSold</text>
  <rect class="panel" x="70" y="285" width="230" height="102" rx="18"/>
  <text class="h" x="94" y="325">WMS</text>
  <text class="small" x="94" y="357">StockReceived</text>
  <rect class="panel" x="70" y="420" width="230" height="102" rx="18"/>
  <text class="h" x="94" y="460">Case</text>
  <text class="small" x="94" y="492">CaseUpdated</text>
  <rect class="accent" x="970" y="125" width="240" height="102" rx="18"/>
  <text class="h" x="994" y="165">Stock Unifié</text>
  <text class="small" x="994" y="197">projette la disponibilité</text>
  <rect class="accent" x="970" y="268" width="240" height="102" rx="18"/>
  <text class="h" x="994" y="308">Vues 360</text>
  <text class="small" x="994" y="340">agrège la situation</text>
  <rect class="accent" x="970" y="411" width="240" height="102" rx="18"/>
  <text class="h" x="994" y="451">Décision</text>
  <text class="small" x="994" y="483">déclenche règles / actions</text>
  <path class="arrow" d="M300 198 C365 198 400 250 465 268"/>
  <path class="arrow" d="M300 333 C365 333 400 315 465 310"/>
  <path class="arrow" d="M300 468 C365 468 400 365 465 340"/>
  <path class="arrowAccent" d="M815 270 C880 240 905 168 970 168"/>
  <path class="arrowAccent" d="M815 305 C880 305 905 310 970 310"/>
  <path class="arrowAccent" d="M815 340 C880 370 905 454 970 454"/>
</svg>
