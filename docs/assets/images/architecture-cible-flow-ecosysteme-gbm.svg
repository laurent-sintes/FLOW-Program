<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">FLOW dans l'écosystème GBM</title>
  <desc id="desc">Diagramme de positionnement cible de FLOW dans l'écosystème applicatif GBM, avec les applications satellites conservées autour de FLOW.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}.title{font:700 34px Arial,sans-serif;fill:#172033}.subtitle{font:400 17px Arial,sans-serif;fill:#596579}.zone{fill:#fff;stroke:#d8dee9;stroke-width:1.6;rx:24}.zone-title{font:700 18px Arial,sans-serif;fill:#172033}.chip{fill:#fff;stroke:#c8d0dc;stroke-width:1.4;rx:13}.chip-finance{fill:#fff;stroke:#d0b3ff;stroke-width:1.8;rx:13}.chip-flow{fill:#111827;stroke:#111827;rx:18}.chip-text{font:700 14px Arial,sans-serif;fill:#253044}.chip-small{font:400 12px Arial,sans-serif;fill:#596579}.flow-title{font:700 24px Arial,sans-serif;fill:#fff}.flow-sub{font:400 13px Arial,sans-serif;fill:#dbe3f0}.caption{font:400 14px Arial,sans-serif;fill:#596579}.arrow{stroke:#8a94a6;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-dasharray:7 6}.arrow-strong{stroke:#4f66e8;stroke-width:2.5;fill:none;marker-end:url(#arrow-strong)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8a94a6"/></marker>
    <marker id="arrow-strong" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4f66e8"/></marker>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="60" y="58">FLOW dans l’écosystème GBM</text>
  <text class="subtitle" x="60" y="88">Positionnement cible : FLOW reprend les responsabilités transverses sans remplacer tous les systèmes satellites.</text>

  <rect class="zone" x="60" y="135" width="420" height="205" rx="24"/>
  <text class="zone-title" x="88" y="170">Engagement / Expériences</text>
  <rect class="chip" x="90" y="200" width="105" height="42" rx="13"/><text class="chip-text" x="125" y="226">SFCC</text>
  <rect class="chip" x="215" y="200" width="105" height="42" rx="13"/><text class="chip-text" x="247" y="226">Mirakl</text>
  <rect class="chip" x="340" y="200" width="105" height="42" rx="13"/><text class="chip-text" x="374" y="226">Zoho</text>
  <rect class="chip" x="90" y="260" width="105" height="42" rx="13"/><text class="chip-text" x="123" y="286">Elastic</text>
  <rect class="chip" x="215" y="260" width="230" height="42" rx="13"/><text class="chip-text" x="275" y="286">Outils magasins</text>

  <rect class="zone" x="60" y="390" width="420" height="205" rx="24"/>
  <text class="zone-title" x="88" y="425">Produit / Offre / Agreements</text>
  <rect class="chip" x="90" y="455" width="130" height="42" rx="13"/><text class="chip-text" x="124" y="481">PLM</text>
  <rect class="chip" x="240" y="455" width="205" height="42" rx="13"/><text class="chip-text" x="291" y="481">PIM / Catalogue</text>
  <rect class="chip" x="90" y="515" width="160" height="42" rx="13"/><text class="chip-text" x="136" y="541">Pricing</text>
  <rect class="chip" x="270" y="515" width="175" height="42" rx="13"/><text class="chip-text" x="312" y="541">Assortiments</text>

  <rect class="zone" x="1020" y="135" width="420" height="245" rx="24"/>
  <text class="zone-title" x="1048" y="170">Supply</text>
  <rect class="chip" x="1050" y="200" width="135" height="52" rx="13"/><text class="chip-text" x="1096" y="226">C-LOG</text><text class="chip-small" x="1078" y="244">logistique 3PL / 4PL</text>
  <rect class="chip" x="1205" y="200" width="105" height="52" rx="13"/><text class="chip-text" x="1236" y="226">CBS</text><text class="chip-small" x="1224" y="244">amont fournisseur</text>
  <rect class="chip" x="1330" y="200" width="85" height="52" rx="13"/><text class="chip-text" x="1350" y="226">WMS</text><text class="chip-small" x="1342" y="244">si séparé</text>
  <rect class="chip" x="1050" y="275" width="130" height="42" rx="13"/><text class="chip-text" x="1085" y="301">Transport</text>
  <rect class="chip" x="1200" y="275" width="120" height="42" rx="13"/><text class="chip-text" x="1233" y="301">Dépôts</text>
  <rect class="chip" x="1340" y="275" width="75" height="42" rx="13"/><text class="chip-text" x="1355" y="301">Stores</text>

  <rect class="zone" x="1020" y="430" width="420" height="165" rx="24"/>
  <text class="zone-title" x="1048" y="465">Finance</text>
  <rect class="chip-finance" x="1050" y="495" width="165" height="48" rx="13"/><text class="chip-text" x="1092" y="524">SAP FI/CO</text>
  <rect class="chip-finance" x="1240" y="495" width="175" height="48" rx="13"/><text class="chip-text" x="1280" y="524">Comptabilité</text>
  <text class="chip-small" x="1050" y="570">Documents, écritures, contrôles, fiscalité</text>

  <rect class="chip-flow" x="535" y="235" width="430" height="360" rx="24"/>
  <text class="flow-title" x="585" y="280">Plateforme FLOW</text>
  <text class="flow-sub" x="585" y="307">Demand transverse — responsabilités à réunifier</text>
  <rect class="chip" x="585" y="335" width="330" height="42" rx="13"/><text class="chip-text" x="639" y="361">Plateforme de Case Management</text>
  <rect class="chip" x="585" y="390" width="150" height="42" rx="13"/><text class="chip-text" x="617" y="416">Stock Unifié</text>
  <rect class="chip" x="765" y="390" width="150" height="42" rx="13"/><text class="chip-text" x="784" y="416">Réseau d’Exécution</text>
  <rect class="chip" x="585" y="445" width="330" height="42" rx="13"/><text class="chip-text" x="645" y="471">Supply Service Registry</text>
  <rect class="chip" x="585" y="500" width="160" height="42" rx="13"/><text class="chip-text" x="607" y="526">Product Agreement</text>
  <rect class="chip" x="765" y="500" width="150" height="42" rx="13"/><text class="chip-text" x="813" y="526">Vues 360</text>
  <text class="flow-sub" x="585" y="570">Case, stock, réseau, projections et contexte transverse</text>

  <path class="arrow-strong" d="M480 240 C515 245 515 280 535 310"/>
  <path class="arrow-strong" d="M480 495 C520 490 520 455 535 445"/>
  <path class="arrow-strong" d="M965 315 C995 300 998 270 1020 250"/>
  <path class="arrow" d="M965 505 C995 510 998 512 1020 515"/>

  <text class="caption" x="60" y="650">Lecture : le schéma montre les applications satellites conservées autour de FLOW. Il ne représente pas les applications à retirer.</text>
  <text class="caption" x="60" y="676">StoreLand, Socloz et UR sont traités dans le texte comme applications à retirer / remplacer dans la trajectoire cible.</text>
  <text class="caption" x="60" y="702">Ce schéma est un positionnement, pas une cartographie de flux. Les interactions détaillées seront décrites dans l’architecture fonctionnelle cible.</text>
</svg>
