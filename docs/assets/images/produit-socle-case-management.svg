<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Schéma produit — Socle Case Management</title>
  <desc id="desc">Le Case comme unité autonome de décision métier et d'orchestration.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="780" rx="24"/>
  <text class="title" x="52" y="58">Socle Case Management</text>
  <text class="subtitle" x="52" y="86">Le Case porte la demande, le contexte, les décisions métier et l'histoire ; le workflow n'est qu'un composant d'exécution.</text>
  <rect class="panel" x="50" y="130" width="270" height="220" rx="18"/>
  <text class="h" x="74" y="170">Canaux &amp; domaines</text>
  <text class="small" x="74" y="202">Engagement client</text>
  <text class="small" x="74" y="222">SAV / retours</text>
  <text class="small" x="74" y="242">Achats / fournisseur</text>
  <text class="small" x="74" y="262">Back-office métier</text>
  <text class="small" x="74" y="282">Command / Request</text>
  <rect class="panel" x="960" y="130" width="270" height="220" rx="18"/>
  <text class="h" x="984" y="170">Systèmes d'exécution</text>
  <text class="small" x="984" y="202">Stock Unifié</text>
  <text class="small" x="984" y="222">Réseau d'Exécution</text>
  <text class="small" x="984" y="242">Paiement / finance</text>
  <text class="small" x="984" y="262">WMS / POS / partenaires</text>
  <text class="small" x="984" y="282">API / Events</text>
  <rect class="panelSoft" x="430" y="118" width="420" height="260" rx="24"/>
  <text class="h" x="640" y="156" text-anchor="middle">Case</text>
  <text class="small" x="640" y="184" text-anchor="middle">Unité autonome de décision métier et d'orchestration.</text>
  <rect class="pill" x="465" y="215" width="105" height="30" rx="15"/>
  <text class="pillText" x="494" y="235">Request</text>
  <rect class="pill" x="590" y="215" width="105" height="30" rx="15"/>
  <text class="pillText" x="629" y="235">Goal</text>
  <rect class="pill" x="710" y="215" width="105" height="30" rx="15"/>
  <text class="pillText" x="747" y="235">Intent</text>
  <rect class="pill" x="465" y="260" width="105" height="30" rx="15"/>
  <text class="pillText" x="503" y="280">State</text>
  <rect class="pill" x="590" y="260" width="105" height="30" rx="15"/>
  <text class="pillText" x="628" y="280">Docs</text>
  <rect class="pill" x="710" y="260" width="107" height="30" rx="15"/>
  <text class="pillText" x="733" y="280">Views 360</text>
  <rect class="accent" x="500" y="320" width="280" height="44" rx="18"/>
  <text class="h" x="640" y="349" text-anchor="middle">Event log + décisions métier</text>
  <path class="arrow" d="M320 240 C365 240 382 240 430 240"/>
  <text class="label" x="340" y="224">crée / agit</text>
  <path class="arrow" d="M850 240 C895 240 915 240 960 240"/>
  <text class="label" x="872" y="224">délègue</text>
  <path class="arrowAccent" d="M960 304 C905 398 770 422 680 380"/>
  <text class="label" x="855" y="410" text-anchor="middle">événements d'exécution</text>
  <rect class="accent" x="392" y="414" width="496" height="54" rx="16"/>
  <text class="h" x="640" y="447" text-anchor="middle">Le processus émerge des décisions métier prises</text>
  <text class="h" x="640" y="469" text-anchor="middle">sur le Case.</text>
  <path class="arrowAccent dash" d="M640 414 C640 394 640 394 640 378"/>
  <rect class="panel" x="85" y="505" width="1110" height="210" rx="22"/>
  <text class="h" x="118" y="540">Boucle opérationnelle du Case</text>
  <text class="small" x="118" y="566">L'exécution de la demande influence la décision métier et adapte continuellement le plan d'exécution.</text>
  <circle class="accent" cx="145" cy="620" r="42"/>
  <text class="num" x="138" y="627">1</text>
  <text class="h" x="145" y="696" text-anchor="middle">J'observe</text>
  <path class="arrow" d="M197 620 L283 620"/>
  <circle class="panelSoft" cx="335" cy="620" r="42"/>
  <text class="num" x="328" y="627">2</text>
  <text class="h" x="335" y="696" text-anchor="middle">Je comprends</text>
  <path class="arrow" d="M387 620 L473 620"/>
  <circle class="accent" cx="525" cy="620" r="42"/>
  <text class="num" x="518" y="627">3</text>
  <text class="h" x="525" y="696" text-anchor="middle">Je décide</text>
  <path class="arrow" d="M577 620 L663 620"/>
  <circle class="panelSoft" cx="715" cy="620" r="42"/>
  <text class="num" x="708" y="627">4</text>
  <text class="h" x="715" y="696" text-anchor="middle">Je planifie</text>
  <path class="arrow" d="M767 620 L853 620"/>
  <circle class="accent" cx="905" cy="620" r="42"/>
  <text class="num" x="898" y="627">5</text>
  <text class="h" x="905" y="696" text-anchor="middle">J'agis</text>
  <path class="arrow" d="M957 620 L1043 620"/>
  <circle class="panelSoft" cx="1095" cy="620" r="42"/>
  <text class="num" x="1088" y="627">6</text>
  <text class="h" x="1095" y="696" text-anchor="middle">J'apprends</text>
</svg>
