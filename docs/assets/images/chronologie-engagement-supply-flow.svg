<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Chronologie de traitement FLOW</title>
  <desc id="desc">Chronologie montrant comment une intention captée dans Engagement devient une demande FLOW, une décision de Fulfillment, un plan d'exécution Supply, puis des faits et événements remontent vers le Case.</desc>
  <defs>
    <style>
      .bg{fill:#f7fbfa}
      .lane{fill:#ffffff;stroke:#d8e7e3;stroke-width:2}
      .eng{fill:#f2f0fb;stroke:#6d5ea8;stroke-width:2.5}
      .flow{fill:#e8f5f2;stroke:#21695f;stroke-width:2.5}
      .fulfill{fill:#fff6e8;stroke:#d98b28;stroke-width:2.5}
      .supply{fill:#eef4ff;stroke:#4d6fae;stroke-width:2.5}
      .feedback{fill:#ffffff;stroke:#91a7a1;stroke-width:2;stroke-dasharray:7 7}
      .title{font:700 34px Aptos,Calibri,sans-serif;fill:#123f3a}
      .subtitle{font:600 17px Aptos,Calibri,sans-serif;fill:#58706b}
      .laneTitle{font:700 20px Aptos,Calibri,sans-serif;fill:#173f3a}
      .num{font:700 22px Aptos,Calibri,sans-serif;fill:#ffffff}
      .h{font:700 19px Aptos,Calibri,sans-serif;fill:#173f3a}
      .t{font:500 14px Aptos,Calibri,sans-serif;fill:#24333f}
      .s{font:600 13px Aptos,Calibri,sans-serif;fill:#62756f}
      .badge{fill:#21695f}
      .badge2{fill:#d98b28}
      .badge3{fill:#4d6fae}
      .badge4{fill:#6d5ea8}
      .arrow{stroke:#21695f;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .arrow2{stroke:#d98b28;stroke-width:3;fill:none;marker-end:url(#arrow2)}
      .arrow3{stroke:#4d6fae;stroke-width:3;fill:none;marker-end:url(#arrow3)}
      .dash{stroke:#6d5ea8;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow4)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#21695f"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#d98b28"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#4d6fae"/>
    </marker>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10z" fill="#6d5ea8"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1040" rx="30"/>
  <text class="title" x="70" y="72">Chronologie Engagement → FLOW → Supply</text>
  <text class="subtitle" x="70" y="103">Une demande n'est pas un aller simple : la décision progresse avec les faits, événements, contraintes et retours d'exécution.</text>

  <rect class="lane" x="70" y="150" width="1460" height="195" rx="24"/>
  <text class="laneTitle" x="105" y="188">Engagement</text>

  <rect class="lane" x="70" y="380" width="1460" height="300" rx="24"/>
  <text class="laneTitle" x="105" y="418">FLOW : Demand + Fulfillment</text>

  <rect class="lane" x="70" y="715" width="1460" height="205" rx="24"/>
  <text class="laneTitle" x="105" y="753">Supply</text>

  <rect class="eng" x="190" y="205" width="245" height="100" rx="18"/>
  <circle class="badge4" cx="220" cy="235" r="19"/><text class="num" x="214" y="243">1</text>
  <text class="h" x="252" y="238">Capte l'intention</text>
  <text class="t" x="252" y="266">parcours, canal, contexte</text>

  <rect class="flow" x="330" y="455" width="245" height="120" rx="18"/>
  <circle class="badge" cx="360" cy="485" r="19"/><text class="num" x="354" y="493">2</text>
  <text class="h" x="392" y="488">Crée le Case</text>
  <text class="t" x="392" y="516">demande qualifiée</text>
  <text class="t" x="392" y="542">statut initial</text>

  <rect class="flow" x="625" y="455" width="245" height="120" rx="18"/>
  <circle class="badge" cx="655" cy="485" r="19"/><text class="num" x="649" y="493">3</text>
  <text class="h" x="687" y="488">Enrichit</text>
  <text class="t" x="687" y="516">Agreement, règles</text>
  <text class="t" x="687" y="542">priorités, contexte</text>

  <rect class="fulfill" x="920" y="455" width="245" height="120" rx="18"/>
  <circle class="badge2" cx="950" cy="485" r="19"/><text class="num" x="944" y="493">4</text>
  <text class="h" x="982" y="488">Décide</text>
  <text class="t" x="982" y="516">promesse tenable</text>
  <text class="t" x="982" y="542">allocation, sourcing</text>

  <rect class="supply" x="1090" y="780" width="245" height="100" rx="18"/>
  <circle class="badge3" cx="1120" cy="810" r="19"/><text class="num" x="1114" y="818">5</text>
  <text class="h" x="1152" y="813">Exécute</text>
  <text class="t" x="1152" y="841">prépare, transporte</text>

  <rect class="supply" x="780" y="780" width="245" height="100" rx="18"/>
  <circle class="badge3" cx="810" cy="810" r="19"/><text class="num" x="804" y="818">6</text>
  <text class="h" x="842" y="813">Remonte</text>
  <text class="t" x="842" y="841">faits, statuts, events</text>

  <rect class="feedback" x="1215" y="455" width="245" height="120" rx="18"/>
  <circle class="badge" cx="1245" cy="485" r="19"/><text class="num" x="1239" y="493">7</text>
  <text class="h" x="1277" y="488">Actualise</text>
  <text class="t" x="1277" y="516">Case, promesse</text>
  <text class="t" x="1277" y="542">exception si besoin</text>

  <rect class="eng" x="1240" y="205" width="245" height="100" rx="18"/>
  <circle class="badge4" cx="1270" cy="235" r="19"/><text class="num" x="1264" y="243">8</text>
  <text class="h" x="1302" y="238">Informe</text>
  <text class="t" x="1302" y="266">promesse, statut, choix</text>

  <path class="arrow" d="M435 255 C500 285 505 420 455 455"/>
  <path class="arrow" d="M575 515 L625 515"/>
  <path class="arrow2" d="M870 515 L920 515"/>
  <path class="arrow3" d="M1042 575 C1110 650 1180 705 1212 780"/>
  <path class="arrow3" d="M1090 830 L1025 830"/>
  <path class="dash" d="M780 830 C650 805 560 690 525 575"/>
  <path class="dash" d="M1025 830 C1160 780 1250 670 1305 575"/>
  <path class="dash" d="M1338 455 C1350 405 1360 350 1362 305"/>

  <text class="s" x="500" y="312">demande</text>
  <text class="s" x="1180" y="695">plan d'exécution</text>
  <text class="s" x="590" y="780">retour d'information</text>
  <text class="s" x="1372" y="385">promesse et statut</text>
</svg>
