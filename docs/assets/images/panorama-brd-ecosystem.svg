<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Synthèse de l'écosystème applicatif BRD</title>
  <desc id="desc">Schéma synthétique des blocs applicatifs BRD et de leurs responsabilités à qualifier pour FLOW.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbfa}.panel{fill:#fff;stroke:#c7e4de;stroke-width:2}.panelSoft{fill:#eaf4f2;stroke:#236159;stroke-width:2}.accent{fill:#fff8f0;stroke:#e09238;stroke-width:2}.amber{fill:#fff8f0;stroke:#e09238;stroke-width:2}.green{fill:#eaf4f2;stroke:#236159;stroke-width:2}.blue{fill:#edf6fb;stroke:#7fb2d4;stroke-width:2}.purple{fill:#f4f0fb;stroke:#a98bd3;stroke-width:2}.grey{fill:#f4f6f8;stroke:#cbd5e1;stroke-width:2}.red{fill:#fff0ef;stroke:#d98b7d;stroke-width:2}.core{fill:#236159;stroke:#0b3954;stroke-width:2}.dark{fill:#0b3954;stroke:#052437;stroke-width:2}.title{font:700 28px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.subtitle{font:600 16px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.h{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.hWhite{font:700 18px Aptos,Calibri,Segoe UI,sans-serif;fill:#fff}.txt{font:500 15px Aptos,Calibri,Segoe UI,sans-serif;fill:#1e293b}.small{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#5b6b78}.smallWhite{font:500 13px Aptos,Calibri,Segoe UI,sans-serif;fill:#eaf4f2}.pill{fill:#eaf4f2;stroke:#c7e4de;stroke-width:1.5}.pillAccent{fill:#fff8f0;stroke:#e09238;stroke-width:1.5}.pillText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#0b3954}.pillAccentText{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.arrow{stroke:#236159;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.arrowAccent{stroke:#e09238;stroke-width:2.5;fill:none;marker-end:url(#arrowAccent)}.arrowSoft{stroke:#8aa7a1;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}.dash{stroke-dasharray:6 6}.label{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#236159}.labelAccent{font:700 12px Aptos,Calibri,Segoe UI,sans-serif;fill:#8a4f0f}.num{font:800 20px Aptos,Calibri,Segoe UI,sans-serif;fill:#e09238}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#236159"/></marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e09238"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="820" rx="24"/>
  <text class="title" x="64" y="58">Écosystème applicatif BRD — lecture synthétique</text>
  <text class="subtitle" x="64" y="86">FLOW remplace SAP et NewStore : la question est de clarifier les responsabilités qui restent, sortent ou deviennent des capacités FLOW.</text>
  <rect class="green" x="64" y="125" width="260" height="122" rx="18"/>
  <text class="h" x="88" y="165">Sourcing</text>
  <text class="small" x="88" y="197">Collaboration fournisseur.</text>
  <text class="small" x="88" y="217">SNC · Fast.</text>

  <rect class="purple" x="64" y="290" width="260" height="150" rx="18"/>
  <text class="h" x="88" y="330">PLM / Planning</text>
  <text class="small" x="88" y="362">Produit, planification, prévisions.</text>
  <text class="small" x="88" y="382">PLM · BPC · Optimate.</text>

  <rect class="amber" x="64" y="500" width="260" height="142" rx="18"/>
  <text class="h" x="88" y="540">Sustainability</text>
  <text class="small" x="88" y="572">DTT.</text>
  <text class="small" x="88" y="592">Sujet transverse à relier aux</text>
  <text class="small" x="88" y="612">exigences de données.</text>

  <rect class="green" x="382" y="220" width="270" height="205" rx="18"/>
  <text class="h" x="406" y="260">Achat / Stock</text>
  <text class="small" x="406" y="292">SAP porte le cœur transactionnel</text>
  <text class="small" x="406" y="312">actuel : achats, commandes, finance,</text>
  <text class="small" x="406" y="332">billing.</text>
  <text class="small" x="406" y="352">Stock entrepôt.</text>

  <rect class="green" x="480" y="540" width="350" height="155" rx="18"/>
  <text class="h" x="504" y="580">NewStore / OMS</text>
  <text class="small" x="504" y="612">Commandes, promesse, allocation et réservation.</text>
  <text class="small" x="504" y="632">Point clé si NewStore disparaît du paysage cible.</text>

  <rect class="amber" x="735" y="125" width="270" height="170" rx="18"/>
  <text class="h" x="759" y="165">E-commerce &amp; B2B</text>
  <text class="small" x="759" y="197">Salesforce, Elastic, CMS / Web</text>
  <text class="small" x="759" y="217">Platform.</text>
  <text class="small" x="759" y="237">Canaux et exposition digitale.</text>

  <rect class="amber" x="735" y="340" width="270" height="145" rx="18"/>
  <text class="h" x="759" y="380">Retail / Stores</text>
  <text class="small" x="759" y="412">Cegid Y2.</text>
  <text class="small" x="759" y="432">Back-office stores et stock magasin.</text>

  <rect class="grey" x="1040" y="210" width="190" height="210" rx="18"/>
  <text class="h" x="1064" y="250">WMS</text>
  <text class="small" x="1064" y="282">KTN BE, C-Logistics,</text>
  <text class="small" x="1064" y="302">Bleckmann UK, FMS</text>
  <text class="small" x="1064" y="322">FR.</text>
  <text class="small" x="1064" y="342">Exécution logistique.</text>

  <rect class="grey" x="1040" y="470" width="190" height="142" rx="18"/>
  <text class="h" x="1064" y="510">Douanes</text>
  <text class="small" x="1064" y="542">Connex.</text>
  <text class="small" x="1064" y="562">Statuts, documents et</text>
  <text class="small" x="1064" y="582">événements.</text>

  <path class="arrowSoft" d="M324 190 C355 205 365 258 382 306"/>
  <path class="arrowSoft" d="M324 365 C350 360 362 344 382 330"/>
  <path class="arrow" d="M652 310 C690 262 708 228 735 210"/>
  <path class="arrow" d="M652 360 C695 398 708 412 735 420"/>
  <path class="arrowAccent" d="M550 425 C560 475 585 515 620 540"/>
  <path class="arrow" d="M830 618 C920 568 980 420 1040 325"/>
  <path class="arrow" d="M830 650 C920 636 980 548 1040 528"/>
  <rect class="panelSoft" x="64" y="735" width="1158" height="52" rx="14"/>
  <text class="small" x="84" y="765">Lecture FLOW : SAP et NewStore sont dans le périmètre de remplacement initial, mais l'écosystème montre des responsabilités distribuées à qualifier avant de décider ce qui entre</text>
  <text class="small" x="84" y="783">réellement dans FLOW.</text>
</svg>
